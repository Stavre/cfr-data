name: Aggregate station delays workflow
run-name: ${{ github.actor }} is aggregating station delays
on:
  workflow_dispatch:
    inputs:
      stations:
        description: "stations to process. 'all' for all stations, list of values for subset of stations"
        required: false
        default: 'all'
      cfr_date:
        description: "Date to process. Accepts 'today', 'yesterday', or a date in DD.MM.YYYY format (e.g. 09.05.2020)"
        required: false
        default: 'yesterday'
      timezone:
        description: "Timezone to use when resolving 'today' or 'yesterday' (e.g. Europe/Bucharest, UTC)"
        required: false
        default: 'Europe/Bucharest'
      raw_file:
        description: "Raw file to use as input. Use 'latest' to automatically pick the newest file for the resolved date, or provide a file name (e.g. 2026-06-07T04-00-30Z.csv) to use a specific file."
        required: false
        default: 'latest'
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write
jobs:
  Set-workflow-variables:
    runs-on: ubuntu-latest
    outputs:
      year: ${{ steps.set-vars.outputs.year }}
      month: ${{ steps.set-vars.outputs.month }}
      day: ${{ steps.set-vars.outputs.day }}
    steps:
      - name: Set date/time variables
        id: set-vars
        run: |
          INPUT_DATE="${{ inputs.cfr_date || 'yesterday' }}"
          TIMEZONE="${{ inputs.timezone || 'Europe/Bucharest' }}"
          if [ "$INPUT_DATE" = "today" ]; then
            TARGET_DATE=$(TZ="$TIMEZONE" date +'%Y-%m-%d')
          elif [ "$INPUT_DATE" = "yesterday" ]; then
            TARGET_DATE=$(TZ="$TIMEZONE" date -d 'yesterday' +'%Y-%m-%d')
          else
            TARGET_DATE=$(date -d "$(echo "$INPUT_DATE" | awk -F. '{print $3"-"$2"-"$1}')" +'%Y-%m-%d')
          fi
          YEAR=$(date -d "$TARGET_DATE" +'%Y')
          MONTH=$(date -d "$TARGET_DATE" +'%m')
          DAY=$(date -d "$TARGET_DATE" +'%d')
          echo "year=$YEAR" >> $GITHUB_OUTPUT
          echo "month=$MONTH" >> $GITHUB_OUTPUT
          echo "day=$DAY" >> $GITHUB_OUTPUT
          echo "year=$YEAR"
          echo "month=$MONTH"
          echo "day=$DAY"

  Aggregate-station-delays:
    runs-on: ubuntu-latest
    needs:
      - Set-workflow-variables
    steps:
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "25"

      - name: Check out CFR data
        uses: actions/checkout@v6
        with:
          repository: "Stavre/cfr-data"
          ref: ${{ github.ref_name }}
          path: "cfr-data"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out CFR data aggregator
        uses: actions/checkout@v6
        with:
          repository: "Stavre/cfr-data-aggregator"
          path: "cfr-data-aggregator"

      - name: Find latest raw file for date
        id: find-latest-raw-file
        run: |
          pwd
          ls
          RAW_FILE_INPUT="${{ inputs.raw_file || 'latest' }}"
          if [ "$RAW_FILE_INPUT" = "latest" ]; then
            RAW_FILE=$(ls -t cfr-data/raw/${{ needs.Set-workflow-variables.outputs.year }}/${{ needs.Set-workflow-variables.outputs.month }}/${{ needs.Set-workflow-variables.outputs.day }}/station/*.csv 2>/dev/null | head -1)
          else
            RAW_FILE="cfr-data/raw/${{ needs.Set-workflow-variables.outputs.year }}/${{ needs.Set-workflow-variables.outputs.month }}/${{ needs.Set-workflow-variables.outputs.day }}/station/$RAW_FILE_INPUT"
          fi
          echo "raw_file=$RAW_FILE" >> $GITHUB_OUTPUT
          echo "raw_file=$RAW_FILE"

      - name: Set gradlew permission - cfr-data-aggregator
        run: chmod +x ./gradlew
        working-directory: ./cfr-data-aggregator

      - name: Creating aggregated delay dataset
        env:
          INPUT_PATH: "../${{ steps.find-latest-raw-file.outputs.raw_file }}"
          OUTPUT_BASE_PATH: "../cfr-data/aggregated/${{ needs.Set-workflow-variables.outputs.year }}/${{ needs.Set-workflow-variables.outputs.month }}/station"
        run: |
          ls
          pwd
          echo $INPUT_PATH
          ./gradlew bootRun --args="aggregate-delays --stations='${{ inputs.stations || 'all' }}' --input-file='$INPUT_PATH' -p '$OUTPUT_BASE_PATH'"
        working-directory: ./cfr-data-aggregator

      - name: Commit aggregated arrivals and departures delay csv file
        run: |
          git config --global user.name '${{ github.actor }}'
          git add --all
          git commit -am "Automated report"
          git pull --rebase origin ${{ github.ref_name }}
          git push
        working-directory: ./cfr-data
