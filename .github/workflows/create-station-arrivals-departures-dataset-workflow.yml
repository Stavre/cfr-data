name: Create train arrivals dataset workflow
run-name: ${{ github.actor }} is creating a new train arrivals dataset
on:
  workflow_dispatch:
    inputs:
      stations:
        description: "stations to process. 'all' for all stations, list of values for subset of stations"
        required: false
        default: 'all'
      cfr_date:
        description: "Date to process. Accepts 'today', 'yesterday', or a date in DD.MM.YYYY format (e.g. 09.05.2020)"
        required: false
        default: 'yesterday'
      timezone:
        description: "Timezone to use when resolving 'today' or 'yesterday' (e.g. Europe/Bucharest, UTC)"
        required: false
        default: 'Europe/Bucharest'
  schedule:
    - cron: '0 */2 * * *'

permissions:
  contents: write
jobs:
  Set-workflow-variables:
    runs-on: ubuntu-latest
    outputs:
      year: ${{ steps.set-vars.outputs.year }}
      month: ${{ steps.set-vars.outputs.month }}
      day: ${{ steps.set-vars.outputs.day }}
      workflow_run_timestamp: ${{ steps.set-vars.outputs.workflow_run_timestamp }}
    steps:
      - name: Set date/time variables
        id: set-vars
        run: |
          INPUT_DATE="${{ inputs.cfr_date || 'yesterday' }}"
          TIMEZONE="${{ inputs.timezone || 'Europe/Bucharest' }}"
          if [ "$INPUT_DATE" = "today" ]; then
            TARGET_DATE=$(TZ="$TIMEZONE" date +'%Y-%m-%d')
          elif [ "$INPUT_DATE" = "yesterday" ]; then
            TARGET_DATE=$(TZ="$TIMEZONE" date -d 'yesterday' +'%Y-%m-%d')
          else
            TARGET_DATE=$(date -d "$(echo "$INPUT_DATE" | awk -F. '{print $3"-"$2"-"$1}')" +'%Y-%m-%d')
          fi
          YEAR=$(date -d "$TARGET_DATE" +'%Y')
          MONTH=$(date -d "$TARGET_DATE" +'%m')
          DAY=$(date -d "$TARGET_DATE" +'%d')
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H-%M-%SZ')
          echo "year=$YEAR" >> $GITHUB_OUTPUT
          echo "month=$MONTH" >> $GITHUB_OUTPUT
          echo "day=$DAY" >> $GITHUB_OUTPUT
          echo "workflow_run_timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "year=$YEAR"
          echo "month=$MONTH"
          echo "day=$DAY"
          echo "workflow_run_timestamp=$TIMESTAMP"

  Create-raw-station-dataset:
    runs-on: ubuntu-latest
    needs:
      - Set-workflow-variables

    steps:
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "25"

      - name: Check out CFR data
        uses: actions/checkout@v6
        with:
          repository: "Stavre/cfr-data"
          path: "cfr-data"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out CFR api adapter
        uses: actions/checkout@v6
        with:
          repository: "Stavre/cfr-api-adapter"
          path: "cfr-api-adapter"

      - name: Check out CFR data aggregator
        uses: actions/checkout@v6
        with:
          repository: "Stavre/cfr-data-aggregator"
          path: "cfr-data-aggregator"

      - name: Set gradlew permission - cfr-api-adapter
        run: chmod +x ./gradlew
        working-directory: ./cfr-api-adapter

      - name: Starting CFR api adapter backend
        run: ./gradlew bootRun &
        working-directory: ./cfr-api-adapter

      - name: Wait for CFR api adapter backend to start
        run: timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 3; done'
        working-directory: ./cfr-api-adapter

      - name: Set gradlew permission - cfr-data-aggregator
        run: chmod +x ./gradlew
        working-directory: ./cfr-data-aggregator

      - name: Creating dataset using CFR data aggregator
        run: ./gradlew bootRun --args="export-arrivals-departures --date='${{ needs.Set-workflow-variables.outputs.day }}.${{ needs.Set-workflow-variables.outputs.month }}.${{ needs.Set-workflow-variables.outputs.year }}' --stations='${{ inputs.stations || 'all' }}' --output='../cfr-data/raw/${{ needs.Set-workflow-variables.outputs.year }}/${{ needs.Set-workflow-variables.outputs.month }}/${{ needs.Set-workflow-variables.outputs.day }}/station/${{ needs.Set-workflow-variables.outputs.workflow_run_timestamp }}.csv'"
        working-directory: ./cfr-data-aggregator

      - name: Commit raw arrivals and departures csv file
        run: |
          git config --global user.name '${{ github.actor }}'
          git add --all
          git commit -am "Automated report"
          git pull --rebase origin ${{ github.ref_name }}
          git push
        working-directory: ./cfr-data

  Create-aggregated-station-delay-dataset:
    runs-on: ubuntu-latest
    needs:
      - Set-workflow-variables
      - Create-raw-station-dataset
    steps:
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "25"

      - name: Check out CFR data
        uses: actions/checkout@v6
        with:
          repository: "Stavre/cfr-data"
          ref: ${{ github.ref_name }}
          path: "cfr-data"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out CFR data aggregator
        uses: actions/checkout@v6
        with:
          repository: "Stavre/cfr-data-aggregator"
          path: "cfr-data-aggregator"

      - name: Set gradlew permission - cfr-data-aggregator
        run: chmod +x ./gradlew
        working-directory: ./cfr-data-aggregator

      - name: Creating dataset using CFR data aggregator
        env:
          INPUT_PATH: "../cfr-data/raw/${{ needs.Set-workflow-variables.outputs.year }}/${{ needs.Set-workflow-variables.outputs.month }}/${{ needs.Set-workflow-variables.outputs.day }}/station/${{ needs.Set-workflow-variables.outputs.workflow_run_timestamp }}.csv"
        run: ./gradlew bootRun --args="aggregate-delays  --stations='${{ inputs.stations || 'all' }}' --input-file='$INPUT_PATH' -p '../cfr-data/aggregated/${{ needs.Set-workflow-variables.outputs.year }}/${{ needs.Set-workflow-variables.outputs.month }}/station'"
        working-directory: ./cfr-data-aggregator

      - name: Commit raw aggregated arrivals and departures delay csv file
        run: |
          git config --global user.name '${{ github.actor }}'
          git add --all
          git commit -am "Automated report"
          git pull --rebase origin ${{ github.ref_name }}
          git push
        working-directory: ./cfr-data
